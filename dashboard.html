<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>لوحة التحكم | ETOILE CHELGHOUM LAID</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
<style>
    :root {
        --primary-dark:#0E4832; --primary-mid:#136F46; --red-accent:#C8102E;
        --gold:#D4AF37; --white:#F2F2F2; --black:#1A1A1A;
        --shadow-soft: 0 8px 32px rgba(0,0,0,0.08);
        --shadow-medium: 0 12px 40px rgba(0,0,0,0.15);
        --sidebar-w: 260px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Cairo',sans-serif; direction:rti; background:#f4f6f5; color:var(--black); }
    a { text-decoration:none; color:inherit; }
    button { font-family:'Cairo'; cursor:pointer; }

    /* ===== LAYOUT ===== */
    .app { display:flex; min-height:100vh; }
    .sidebar {
        width: var(--sidebar-w); background: var(--primary-dark); color:var(--white);
        position:fixed; top:0; right:0; bottom:0; overflow-y:auto; z-index:100;
        display:flex; flex-direction:column;
    }
    .sidebar .brand {
        display:flex; align-items:center; gap:10px; padding:22px 18px; border-bottom:1px solid rgba(255,255,255,0.08);
    }
    .sidebar .brand .badge {
        width:40px; height:40px; border-radius:50%; background:var(--white); color:var(--primary-dark);
        display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue'; font-size:1.2rem;
    }
    .sidebar .brand span { font-family:'Bebas Neue'; letter-spacing:1px; font-size:1.05rem; }
    .nav-group { padding:14px 10px; }
    .nav-group .group-label { font-size:0.72rem; color:rgba(255,255,255,0.4); padding:8px 12px; letter-spacing:1px; }
    .nav-btn {
        display:flex; align-items:center; gap:12px; width:100%; padding:11px 14px; border:none; background:transparent;
        color:rgba(255,255,255,0.8); border-radius:12px; font-size:0.9rem; font-weight:600; transition:0.25s; text-align:right;
    }
    .nav-btn i { width:18px; text-align:center; color:var(--gold); }
    .nav-btn:hover { background:rgba(255,255,255,0.06); color:var(--white); }
    .nav-btn.active { background:var(--red-accent); color:var(--white); }
    .nav-btn.active i { color:var(--white); }
    .nav-btn .count-pill {
        margin-right:auto; background:rgba(255,255,255,0.15); font-size:0.72rem; padding:2px 8px; border-radius:10px;
    }
    .sidebar .logout-btn {
        margin:16px 14px; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.15);
        background:transparent; color:rgba(255,255,255,0.7); font-weight:700; font-size:0.85rem;
        display:flex; align-items:center; justify-content:center; gap:8px; transition:0.3s;
    }
    .sidebar .logout-btn:hover { background:rgba(255,255,255,0.08); color:var(--white); }

    .main { flex:1; margin-right: var(--sidebar-w); padding:26px 30px; max-width: calc(100% - var(--sidebar-w)); }
    .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:10px; }
    .topbar h2 { font-family:'Bebas Neue'; font-size:1.9rem; color:var(--primary-dark); letter-spacing:1px; }
    .topbar .view-site { background:var(--primary-mid); color:var(--white); padding:9px 18px; border-radius:30px; font-size:0.85rem; font-weight:700; border:none; display:flex; gap:8px; align-items:center; }

    /* ===== PANELS ===== */
    .panel { display:none; }
    .panel.active { display:block; }

    /* Dashboard overview */
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:18px; margin-bottom:26px; }
    .stat-card {
        background:var(--white); border-radius:20px; padding:20px; box-shadow:var(--shadow-soft);
        border-right:5px solid var(--gold); transition:0.3s;
    }
    .stat-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-medium); }
    .stat-card .val { font-family:'Bebas Neue'; font-size:2.2rem; color:var(--primary-dark); }
    .stat-card .lbl { color:#777; font-size:0.85rem; font-weight:600; }

    /* Toolbar + table (shared for generic CRUD) */
    .panel-toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
    .add-btn {
        background:var(--red-accent); color:var(--white); border:none; padding:10px 20px; border-radius:30px;
        font-weight:700; font-size:0.88rem; display:flex; gap:8px; align-items:center; transition:0.3s;
    }
    .add-btn:hover { background:#a00d24; transform:translateY(-2px); }
    .data-table-wrap { background:var(--white); border-radius:20px; box-shadow:var(--shadow-soft); overflow-x:auto; }
    table.data-table { width:100%; border-collapse:collapse; min-width:600px; }
    table.data-table thead { background:var(--primary-dark); color:var(--white); }
    table.data-table th { padding:14px 12px; font-size:0.85rem; text-align:center; white-space:nowrap; }
    table.data-table td { padding:11px 12px; text-align:center; border-bottom:1px solid #eee; font-size:0.87rem; }
    table.data-table tbody tr:hover { background:#f7faf8; }
    table.data-table img.thumb { width:38px; height:38px; border-radius:50%; object-fit:cover; margin:0 auto; }
    .row-actions { display:flex; gap:6px; justify-content:center; }
    .row-actions button {
        width:32px; height:32px; border-radius:8px; border:none; font-size:0.85rem; transition:0.25s;
    }
    .row-actions .edit-btn { background:#EAF4EE; color:var(--primary-mid); }
    .row-actions .edit-btn:hover { background:var(--primary-mid); color:var(--white); }
    .row-actions .del-btn { background:#FDEAEA; color:var(--red-accent); }
    .row-actions .del-btn:hover { background:var(--red-accent); color:var(--white); }
    .empty-row td { padding:30px; color:#999; }
    .category-players-block { margin-bottom:30px; }
    .category-players-header {
        display:flex; align-items:center; gap:12px; margin-bottom:12px; padding:10px 18px;
        background:var(--primary-dark); color:var(--white); border-radius:14px;
    }
    .category-players-header h3 { font-family:'Bebas Neue'; font-size:1.3rem; letter-spacing:1px; }
    .category-players-header .cnt { margin-right:auto; background:rgba(255,255,255,0.15); padding:3px 12px; border-radius:20px; font-size:0.8rem; }
    .doc-mini-btn {
        background:#f0f0f0; color:#555; border:none; padding:5px 10px; border-radius:14px;
        font-size:0.72rem; font-weight:700; cursor:pointer; transition:0.25s; margin:2px;
    }
    .doc-mini-btn:hover { background:var(--primary-mid); color:var(--white); }

    /* ===== ATTENDANCE ===== */
    .row-actions .att-open-btn { background:#FFF3D6; color:#B8860B; }
    .row-actions .att-open-btn:hover { background:#B8860B; color:var(--white); }
    .row-actions .pay-open-btn { background:#EAF7EE; color:#1D8348; }
    .row-actions .pay-open-btn:hover { background:#1D8348; color:var(--white); }
    .attendance-list { display:flex; flex-direction:column; gap:10px; max-height:50vh; overflow-y:auto; }
    .attendance-row {
        display:flex; justify-content:space-between; align-items:center; padding:12px 16px;
        background:#f7f7f7; border-radius:14px; gap:10px; flex-wrap:wrap;
    }
    .attendance-row .att-name { font-weight:700; font-size:0.92rem; }
    .att-toggle { display:flex; gap:8px; }
    .att-btn {
        padding:8px 16px; border-radius:20px; border:1.5px solid #ddd; background:var(--white);
        font-size:0.82rem; font-weight:700; color:#888; transition:0.25s;
    }
    .att-btn.present.active { background:#1D8348; border-color:#1D8348; color:var(--white); }
    .att-btn.absent.active { background:var(--red-accent); border-color:var(--red-accent); color:var(--white); }

    /* ===== CALL-UPS ===== */
    .callups-box { background:#f7f7f7; border:1.5px dashed #ddd; border-radius:14px; padding:14px; }
    .callups-status { font-size:0.85rem; font-weight:700; color:#B8860B; margin-bottom:10px; }
    .callups-toggle-btn {
        background:var(--primary-mid); color:var(--white); border:none; padding:9px 18px; border-radius:20px;
        font-size:0.85rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:8px;
    }
    .callups-filters { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
    .callups-filters select, .callups-filters input {
        flex:1; min-width:120px; padding:8px 12px; border-radius:10px; border:1px solid #ddd; font-family:'Cairo'; font-size:0.85rem;
    }
    .callups-list { margin-top:12px; max-height:280px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; }
    .callup-row {
        display:flex; justify-content:space-between; align-items:center; padding:9px 14px;
        background:var(--white); border-radius:12px; border:1px solid #eee;
    }
    .callup-row .cr-name { font-size:0.88rem; font-weight:700; }
    .callup-row button {
        border:none; padding:6px 14px; border-radius:20px; font-size:0.78rem; font-weight:700; cursor:pointer;
    }
    .callup-row button.call-btn { background:#EAF7EE; color:#1D8348; }
    .callup-row button.call-btn.called { background:#1D8348; color:var(--white); }

    /* ===== PAYMENTS ===== */
    .months-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
    .month-toggle {
        padding:12px; border-radius:14px; border:1.5px solid #ddd; background:#f7f7f7;
        text-align:center; font-size:0.85rem; font-weight:700; color:#888; transition:0.25s;
    }
    .month-toggle.paid { background:#E1F6EA; border-color:#1D8348; color:#1D8348; }

    /* Registration requests */
    .req-card {
        background:var(--white); border-radius:18px; box-shadow:var(--shadow-soft); padding:18px 20px; margin-bottom:14px;
        border-right:5px solid var(--gold); display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:14px;
    }
    .req-info h4 { font-family:'Cairo'; font-size:1.05rem; margin-bottom:6px; }
    .req-info .req-meta { font-size:0.82rem; color:#777; display:flex; flex-wrap:wrap; gap:12px; }
    .req-status { font-size:0.75rem; font-weight:700; padding:4px 12px; border-radius:20px; }
    .req-status.pending { background:#FFF3D6; color:#B8860B; }
    .req-status.accepted { background:#E1F6EA; color:#1D8348; }
    .req-status.rejected { background:#FDEAEA; color:var(--red-accent); }
    .req-status.needs_edit { background:#E6EEFB; color:#2A5CAA; }
    .req-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .req-actions button { padding:8px 16px; border:none; border-radius:20px; font-size:0.8rem; font-weight:700; }
    .req-actions .accept-btn { background:#1D8348; color:var(--white); }
    .req-actions .reject-btn { background:var(--red-accent); color:var(--white); }
    .req-actions .edit-req-btn { background:#2A5CAA; color:var(--white); }
    .doc-download-btn {
        background:#f0f0f0; color:#555; border:none; padding:7px 14px; border-radius:20px;
        font-size:0.78rem; font-weight:700; cursor:pointer; transition:0.25s;
    }
    .doc-download-btn:hover { background:var(--primary-mid); color:var(--white); }

    /* Categories panel */
    .cat-coach-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; }
    .cat-coach-card { background:var(--white); border-radius:18px; padding:18px; box-shadow:var(--shadow-soft); }
    .cat-coach-card h4 { font-family:'Bebas Neue'; font-size:1.4rem; color:var(--primary-dark); margin-bottom:10px; }
    .cat-coach-card input { width:100%; padding:10px 14px; border-radius:12px; border:1px solid #ddd; margin-bottom:10px; font-family:'Cairo'; }
    .cat-coach-card button { width:100%; padding:9px; border:none; border-radius:12px; background:var(--primary-mid); color:var(--white); font-weight:700; }

    /* ===== SITE SETTINGS ===== */
    .settings-form { background:var(--white); border-radius:20px; padding:26px; box-shadow:var(--shadow-soft); display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    .settings-form .full { grid-column:1/-1; }
    .settings-form h4 {
        grid-column:1/-1; font-family:'Bebas Neue'; font-size:1.2rem; color:var(--primary-dark);
        border-bottom:2px solid var(--gold); padding-bottom:8px; margin-top:10px; letter-spacing:1px;
    }
    .settings-form h4:first-child { margin-top:0; }
    .settings-form label { font-size:0.85rem; font-weight:700; color:#555; display:block; margin-bottom:4px; }
    .settings-form input, .settings-form textarea {
        width:100%; padding:11px 14px; border-radius:12px; border:1px solid #ddd; font-family:'Cairo'; font-size:0.92rem;
    }
    .settings-form textarea { min-height:70px; resize:vertical; }
    @media (max-width:700px) { .settings-form { grid-template-columns:1fr; } }

    /* ===== MODAL ===== */
    .modal-overlay {
        position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; display:none;
        align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px);
    }
    .modal-overlay.active { display:flex; }
    .modal-box {
        background:var(--white); border-radius:24px; width:100%; max-width:560px; max-height:88vh; overflow-y:auto;
        box-shadow:0 30px 80px rgba(0,0,0,0.4);
    }
    .modal-head {
        display:flex; justify-content:space-between; align-items:center; padding:20px 24px; border-bottom:1px solid #eee;
        position:sticky; top:0; background:var(--white);
    }
    .modal-head h3 { font-family:'Bebas Neue'; color:var(--primary-dark); font-size:1.4rem; }
    .modal-head .close-modal { background:none; border:none; font-size:1.4rem; color:#999; }
    .modal-body { padding:22px 24px; display:grid; gap:14px; }
    .modal-body label { font-size:0.85rem; font-weight:700; color:#555; margin-bottom:4px; display:block; }
    .modal-body input, .modal-body select, .modal-body textarea {
        width:100%; padding:11px 14px; border-radius:12px; border:1px solid #ddd; font-family:'Cairo'; font-size:0.92rem;
    }
    .modal-body textarea { min-height:80px; resize:vertical; }
    .image-field-box { background:#f7f7f7; border:1.5px dashed #ddd; border-radius:14px; padding:14px; }
    .image-status { display:flex; align-items:center; gap:8px; font-size:0.85rem; color:#999; margin-bottom:10px; }
    .image-status.has-image { color:#1D8348; font-weight:700; }
    .image-status i { font-size:1rem; }
    .image-field-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .image-upload-btn {
        background:var(--primary-mid); color:var(--white); padding:8px 16px; border-radius:20px;
        font-size:0.82rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:0.25s;
    }
    .image-upload-btn:hover { background:var(--primary-dark); }
    .image-remove-btn {
        background:#FDEAEA; color:var(--red-accent); border:none; padding:8px 16px; border-radius:20px;
        font-size:0.82rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:0.25s;
    }
    .image-remove-btn:hover { background:var(--red-accent); color:var(--white); }
    .modal-foot { padding:16px 24px 22px; }
    .save-btn { width:100%; padding:13px; border:none; border-radius:14px; background:var(--red-accent); color:var(--white); font-weight:700; font-size:1rem; }
    .save-btn:hover { background:#a00d24; }
    .toast {
        position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--black); color:var(--white);
        padding:12px 26px; border-radius:30px; font-size:0.9rem; z-index:3000; opacity:0; transition:0.3s; pointer-events:none;
    }
    .toast.show { opacity:1; transform:translate(-50%,-6px); }

    @media (max-width:900px) {
        .sidebar { width:220px; }
        .main { margin-right:220px; max-width:calc(100% - 220px); }
    }
    @media (max-width:640px) {
        .sidebar { transform:translateX(100%); transition:0.3s; width:250px; }
        .sidebar.open { transform:translateX(0); }
        .main { margin-right:0; max-width:100%; }
        .mobile-toggle { display:block !important; }
    }
    .mobile-toggle {
        display:none; position:fixed; top:16px; left:16px; z-index:200; background:var(--primary-dark);
        color:var(--white); border:none; width:44px; height:44px; border-radius:12px; font-size:1.1rem;
    }
</style>
</head>
<body>
    <button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button>

    <div class="app">
        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="brand"><div class="badge">★</div><span>ETOILE ADMIN</span></div>

            <div class="nav-group">
                <div class="group-label">عام</div>
                <button class="nav-btn active" data-panel="overview"><i class="fas fa-chart-line"></i> Dashboard</button>
                <button class="nav-btn" data-panel="requests"><i class="fas fa-inbox"></i> طلبات التسجيل <span class="count-pill" id="reqCount">0</span></button>
                <button class="nav-btn" data-panel="categories"><i class="fas fa-layer-group"></i> إدارة الفئات</button>
                <button class="nav-btn" data-panel="siteSettings"><i class="fas fa-gear"></i> الإعدادات العامة</button>
            </div>

            <div class="nav-group">
                <div class="group-label">المحتوى الرياضي</div>
                <button class="nav-btn" data-panel="players"><i class="fas fa-user-athlete"></i> اللاعبون</button>
                <button class="nav-btn" data-panel="featuredPlayers"><i class="fas fa-star"></i> أبرز اللاعبين</button>
                <button class="nav-btn" data-panel="sessions"><i class="fas fa-calendar-check"></i> الحصص التدريبية</button>
                <button class="nav-btn" data-panel="matches"><i class="fas fa-futbol"></i> المباريات</button>
                <button class="nav-btn" data-panel="tournaments"><i class="fas fa-trophy"></i> البطولات</button>
                <button class="nav-btn" data-panel="messages"><i class="fas fa-comment-dots"></i> رسائل الأكاديمية</button>
                <button class="nav-btn" data-panel="payments"><i class="fas fa-money-check-dollar"></i> سجل المدفوعات</button>
            </div>

            <div class="nav-group">
                <div class="group-label">محتوى الموقع</div>
                <button class="nav-btn" data-panel="articles"><i class="fas fa-newspaper"></i> المقالات</button>
                <button class="nav-btn" data-panel="documents"><i class="fas fa-file-pdf"></i> المستندات</button>
                <button class="nav-btn" data-panel="news"><i class="fas fa-bullhorn"></i> شريط الأخبار</button>
                <button class="nav-btn" data-panel="gallery"><i class="fas fa-images"></i> معرض الصور</button>
                <button class="nav-btn" data-panel="staff"><i class="fas fa-user-tie"></i> الطاقم الفني</button>
                <button class="nav-btn" data-panel="kits"><i class="fas fa-tshirt"></i> أطقم الأكاديمية</button>
            </div>

            <button class="logout-btn" id="logoutBtn"><i class="fas fa-right-from-bracket"></i> تسجيل الخروج</button>
        </aside>

        <!-- ===== MAIN ===== -->
        <main class="main">
            <div class="topbar">
                <div style="display:flex; align-items:center; gap:10px;">
                    <a href="index.html" class="view-site" style="background:var(--black);"><i class="fas fa-arrow-right"></i> الصفحة الرئيسية</a>
                    <h2 id="panelTitle">نظرة عامة</h2>
                </div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <button class="view-site" id="refreshBtn" style="background:var(--gold); color:var(--black);"><i class="fas fa-rotate"></i> تحديث</button>
                </div>
            </div>

            <!-- Overview -->
            <section class="panel active" id="panel-overview">
                <div class="stats-grid" id="statsGrid"></div>
            </section>

            <!-- Registration Requests -->
            <section class="panel" id="panel-requests">
                <div id="requestsList"></div>
            </section>

            <!-- Categories -->
            <section class="panel" id="panel-categories">
                <div class="cat-coach-grid" id="categoriesGrid"></div>
            </section>

            <!-- Site Settings -->
            <section class="panel" id="panel-siteSettings">
                <div class="settings-form" id="settingsForm"></div>
                <button class="save-btn" id="saveSettingsBtn" style="max-width:260px; margin-top:16px;">
                    <i class="fas fa-save"></i> حفظ إعدادات الموقع
                </button>

                <div class="cat-coach-card" style="margin-top:26px; max-width:400px; border:2px dashed var(--red-accent);">
                    <h4><i class="fas fa-key"></i> تغيير كود الدخول للوحة التحكم</h4>
                    <input type="password" id="newAdminCode" placeholder="الكود الجديد" />
                    <input type="password" id="confirmAdminCode" placeholder="تأكيد الكود الجديد" style="margin-top:8px;" />
                    <button id="changeCodeBtn" style="margin-top:10px; background:var(--red-accent);"><i class="fas fa-save"></i> حفظ الكود الجديد</button>
                    <div id="changeCodeStatus" style="font-size:0.82rem; margin-top:8px; font-weight:700;"></div>
                </div>
            </section>

            <!-- Generic CRUD panels (تُبنى تلقائيًا بالجافاسكريبت) -->
            <section class="panel" id="panel-players">
                <div class="panel-toolbar"><div></div><button class="add-btn" data-add="players"><i class="fas fa-plus"></i> إضافة لاعب</button></div>
                <div id="playersByCategory"></div>

        function normalizeCode(text) {
            const arabicDigits = '٠١٢٣٤٥٦٧٨٩';
            const persianDigits = '۰۱۲۳۴۵۶۷۸۹';
            return text.replace(/[٠-٩]/g, d => arabicDigits.indexOf(d))
                        .replace(/[۰-۹]/g, d => persianDigits.indexOf(d))
                        .trim();
        }
        async function sha256(text) {
            const normalized = normalizeCode(text);
            const data = new TextEncoder().encode(normalized);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // ============================================================
        function uploadToStorage(file, pathPrefix) {
            const maxDim = 1000, quality = 0.75;
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let { width, height } = img;
                        if (width > maxDim || height > maxDim) {
                            const ratio = Math.min(maxDim / width, maxDim / height);
                            width = Math.round(width * ratio);
                            height = Math.round(height * ratio);
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = () => reject(new Error('تعذّرت معالجة الصورة'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('تعذّرت قراءة الملف'));
                reader.readAsDataURL(file);
            });
        }

                                        <td>${p.bloodType || '-'}</td>
                                        <td>${docButtonsHTML(id, p)}</td>
                                        <td class="row-actions">
                                            <button class="pay-open-btn" data-player-record="${id}" title="سجل اللاعب"><i class="fas fa-id-card"></i></button>
                                            <button class="edit-btn" data-key="players" data-id="${id}"><i class="fas fa-pen"></i></button>
                                            <button class="del-btn" data-key="players" data-id="${id}"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `).join('');

            wrap.querySelectorAll('.doc-mini-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const dataUrl = decodeURIComponent(btn.dataset.doc);
                    const ext = dataUrl.includes('application/pdf') ? 'pdf' : 'jpg';
                    const a = document.createElement('a');
                    a.href = dataUrl;
                    a.download = `${btn.dataset.name}.${ext}`;
                    a.click();
                });
            });
            wrap.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => openResourceModal(btn.dataset.key, btn.dataset.id));
            });
            wrap.querySelectorAll('.del-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (!confirm('تأكيد حذف هذا اللاعب؟')) return;
                    await dbDelete('players', btn.dataset.id);
                    delete cache.players[btn.dataset.id];
                    renderPlayersGrouped();
                    showToast('تم الحذف بنجاح');
                });
            });
            wrap.querySelectorAll('[data-player-record]').forEach(btn => {
                btn.addEventListener('click', () => openPlayerRecordModal(btn.dataset.playerRecord));
            });
        }
        const statusLabelsPlayers = { active:'نشيط', injured:'مصاب', suspended:'موقوف' };

        function renderResourceTable(key) {
            const config = RESOURCES[key];
            const table = document.getElementById(`table-${key}`);
            const entries = Object.entries(cache[key] || {});

            const headCols = config.fields.map(f => `<th>${f.label}</th>`).join('');
            let bodyRows;
            if (entries.length === 0) {
                bodyRows = `<tr class="empty-row"><td colspan="${config.fields.length + 1}">لا توجد عناصر بعد. اضغط "إضافة" للبدء.</td></tr>`;
            } else {
                bodyRows = entries.map(([id, item]) => {
                    const cells = config.fields.map(f => {
                        if (f.type === 'callups') {
                            let list = [];
                            try { list = item[f.key] ? JSON.parse(item[f.key]) : []; } catch { list = []; }
                            return `<td>${list.length} لاعب</td>`;
                        }
                        if (f.type === 'pdf') {
                            return `<td>${item[f.key] ? '<i class="fas fa-file-pdf" style="color:var(--red-accent);"></i> ملف مرفوع' : '-'}</td>`;
                        }
                        if (/url|logo|photo|image/i.test(f.key) && item[f.key]) {
                            return `<td><img class="thumb" src="${item[f.key]}" onerror="this.style.visibility='hidden'" /></td>`;
                        }
                        let val = item[f.key] ?? '-';
                        if (f.type === 'select') {
                            const opt = (f.options || []).find(o => o.value === item[f.key]);
                            val = opt ? opt.label : (item[f.key] || '-');
                        }
                        if (f.type === 'textarea' && typeof val === 'string' && val.length > 40) val = val.slice(0,40) + '...';
                        return `<td>${val}</td>`;
                    }).join('');
                    const attendanceBtn = key === 'sessions'
                        ? `<button class="att-open-btn" data-id="${id}" title="تسجيل الحضور"><i class="fas fa-clipboard-check"></i></button>`
                        : '';
                    const recordBtn = key === 'players'
                        ? `<button class="pay-open-btn" data-player-record="${id}" title="سجل اللاعب"><i class="fas fa-id-card"></i></button>`
                        : '';
                    return `<tr>
                        ${cells}
                        <td class="row-actions">
                            ${attendanceBtn}
                            ${recordBtn}
                            <button class="edit-btn" data-key="${key}" data-id="${id}"><i class="fas fa-pen"></i></button>
                            <button class="del-btn" data-key="${key}" data-id="${id}"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
                }).join('');
            }
            table.innerHTML = `<thead><tr>${headCols}<th>إجراءات</th></tr></thead><tbody>${bodyRows}</tbody>`;

            table.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => openResourceModal(btn.dataset.key, btn.dataset.id));
            });
            table.querySelectorAll('.del-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (!confirm('تأكيد حذف هذا العنصر؟')) return;
                    await dbDelete(RESOURCES[btn.dataset.key].node, btn.dataset.id);
                    delete cache[btn.dataset.key][btn.dataset.id];
                    if (btn.dataset.key === 'players') { renderPlayersGrouped(); } else { renderResourceTable(btn.dataset.key); }
                    showToast('تم الحذف بنجاح');
                });
            });
            table.querySelectorAll('.att-open-btn').forEach(btn => {
                btn.addEventListener('click', () => openAttendanceModal(btn.dataset.id));
            });
            table.querySelectorAll('[data-player-record]').forEach(btn => {
                btn.addEventListener('click', () => openPlayerRecordModal(btn.dataset.playerRecord));
            });
        }

        document.querySelectorAll('.add-btn[data-add]').forEach(btn => {
            btn.addEventListener('click', () => openResourceModal(btn.dataset.add, null));
        });

        function fieldToHTML(field, value) {
            const val = value ?? '';
            if (field.type === 'select') {
                // حقل الفئة يأخذ دائمًا القائمة الحالية من catOptions المحدَّثة، بدل القيمة الثابتة وقت تعريف RESOURCES
                const options = field.key === 'category' ? catOptions : (field.options || []);
                const opts = options.map(o =>
                    `<option value="${o.value}" ${o.value === val ? 'selected' : ''}>${o.label}</option>`
                ).join('');
                return `<select data-field="${field.key}">${opts}</select>`;
            }
            if (field.type === 'textarea') {
                return `<textarea data-field="${field.key}">${val}</textarea>`;
            }
            if (field.type === 'color') {
                return `<input type="color" data-field="${field.key}" value="${val || '#0E4832'}" style="height:44px;padding:4px;" />`;
            }
            if (field.type === 'callups') {
                let list = [];
                try { list = value ? JSON.parse(value) : []; } catch { list = []; }
                return `
                    <input type="hidden" data-field="${field.key}" value='${(value || '[]').replace(/'/g, "&apos;")}' />
                    <div class="callups-box">
                        <div class="callups-status" data-callups-status>${list.length} لاعب مستدعى حاليًا</div>
                        <button type="button" class="callups-toggle-btn" data-callups-toggle="${field.key}">
                            <i class="fas fa-users"></i> إدارة قائمة الاستدعاء (كل الفئات)
                        </button>
                        <div class="callups-filters" data-callups-filters="${field.key}" style="display:none;"></div>
                        <div class="callups-list" data-callups-list="${field.key}" style="display:none;"></div>
                    </div>
                `;
            }
            if (field.type === 'pdf') {
                const hasValue = val && val.length > 0;
                return `
                    <input type="hidden" data-field="${field.key}" value="${val}" />
                    <div class="image-field-box">
                        <span class="image-status ${hasValue ? 'has-image' : ''}" data-status-for="${field.key}">
                            ${hasValue ? '<i class="fas fa-circle-check"></i> تم رفع ملف PDF بنجاح' : '<i class="fas fa-file-pdf"></i> لم يتم رفع ملف بعد'}
                        </span>
                        <div class="image-field-actions">
                            <label class="image-upload-btn">
                                <i class="fas fa-upload"></i> ${hasValue ? 'استبدال الملف' : 'رفع ملف PDF'}
                                <input type="file" accept="application/pdf" data-pdf-upload-for="${field.key}" style="display:none;" />
                            </label>
                        </div>
                    </div>
                `;
            }
            // أي حقل اسمه فيه "url" أو "logo" أو "photo" أو "image" يظهر بشكل مربع رفع نظيف بدون إظهار الرابط الطويل
            const isImageField = /url|logo|photo|image/i.test(field.key);
            if (isImageField) {
                const hasValue = val && val.length > 0;
                return `
                    <input type="hidden" data-field="${field.key}" value="${val}" />
                    <div class="image-field-box">
                        <span class="image-status ${hasValue ? 'has-image' : ''}" data-status-for="${field.key}">
                            ${hasValue ? '<i class="fas fa-circle-check"></i> تم رفع الصورة بنجاح' : '<i class="fas fa-image"></i> لم يتم رفع صورة بعد'}
                        </span>
                        <div class="image-field-actions">
                            <label class="image-upload-btn">
                                <i class="fas fa-upload"></i> ${hasValue ? 'استبدال الصورة' : 'رفع صورة'}
                                <input type="file" accept="image/*" data-upload-for="${field.key}" style="display:none;" />
                            </label>
                            ${hasValue ? `<button type="button" class="image-remove-btn" data-remove-for="${field.key}"><i class="fas fa-trash"></i> حذف</button>` : ''}
                        </div>
                    </div>
                `;
            }
            return `<input type="${field.type}" data-field="${field.key}" value="${val}" ${field.required ? 'required' : ''} />`;
        }

        function openResourceModal(key, id) {
            const config = RESOURCES[key];
            const item = id ? cache[key][id] : {};
            document.getElementById('modalTitle').textContent = id ? `تعديل - ${config.title}` : `إضافة - ${config.title}`;
            document.getElementById('modalBody').innerHTML = config.fields.map(f => `
                <div><label>${f.label}</label>${fieldToHTML(f, item[f.key])}</div>
            `).join('');
            document.getElementById('modalOverlay').classList.add('active');

            document.querySelectorAll('[data-callups-toggle]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const fieldKey = btn.dataset.callupsToggle;
                    const listEl = document.querySelector(`[data-callups-list="${fieldKey}"]`);
                    const filtersEl = document.querySelector(`[data-callups-filters="${fieldKey}"]`);
                    const isOpen = listEl.style.display !== 'none';
                    if (isOpen) { listEl.style.display = 'none'; filtersEl.style.display = 'none'; return; }

                    const catSelect = document.querySelector('[data-field="category"]');
                    const defaultCategory = catSelect ? catSelect.value : '';
                    const allPlayersRaw = await dbGet('players');
                    const allPlayers = Object.entries(allPlayersRaw); // [id, playerObj][]

                    // بناء خيارات الفلتر: "كل الفئات" + كل فئة موجود بها لاعبون فعليًا
                    const usedCats = [...new Set(allPlayers.map(([, p]) => p.category).filter(Boolean))];
                    filtersEl.innerHTML = `
                        <select data-callups-cat-filter>
                            <option value="">كل الفئات</option>
                            ${usedCats.map(c => `<option value="${c}" ${c === defaultCategory ? 'selected' : ''}>${c}</option>`).join('')}
                        </select>
                        <input type="text" data-callups-search placeholder="🔍 بحث بالاسم..." />
                    `;
                    filtersEl.style.display = 'flex';

                    function renderList() {
                        const catFilter = filtersEl.querySelector('[data-callups-cat-filter]').value;
                        const search = filtersEl.querySelector('[data-callups-search]').value.trim().toLowerCase();
                        const hiddenInput = document.querySelector(`[data-field="${fieldKey}"]`);
                        let currentList = [];
                        try { currentList = hiddenInput.value ? JSON.parse(hiddenInput.value) : []; } catch { currentList = []; }
                        const currentIds = new Set(currentList.map(c => c.id));

                        const filtered = allPlayers.filter(([, p]) => {
                            const matchCat = !catFilter || p.category === catFilter;
                            const matchSearch = !search || (p.name || '').toLowerCase().includes(search);
                            return matchCat && matchSearch;
                        });

                        if (filtered.length === 0) {
                            listEl.innerHTML = '<p style="text-align:center;color:#999;font-size:0.85rem;">لا يوجد لاعبون مطابقون.</p>';
                            return;
                        }
                        listEl.innerHTML = filtered.map(([pid, p]) => `
                            <div class="callup-row" data-player-id="${pid}" data-player-name="${p.name || ''}">
                                <span class="cr-name">${p.name || ''} ${p.category ? '(' + p.category + ')' : ''} ${p.number !== undefined && p.number !== '' ? '#' + p.number : ''}</span>
                                <button type="button" class="call-btn ${currentIds.has(pid) ? 'called' : ''}">
                                    ${currentIds.has(pid) ? 'إزالة' : 'استدعاء'}
                                </button>
                            </div>
                        `).join('');
                        listEl.querySelectorAll('.call-btn').forEach(callBtn => {
                            callBtn.addEventListener('click', () => {
                                const row = callBtn.closest('.callup-row');
                                const pid = row.dataset.playerId;
                                const pname = row.dataset.playerName;
                                let list = [];
                                try { list = hiddenInput.value ? JSON.parse(hiddenInput.value) : []; } catch { list = []; }
                                const exists = list.find(c => c.id === pid);
                                if (exists) {
                                    list = list.filter(c => c.id !== pid);
                                } else {
                                    list.push({ id: pid, name: pname });
                                }
                                hiddenInput.value = JSON.stringify(list);
                                document.querySelector(`[data-callups-status]`).textContent = `${list.length} لاعب مستدعى حاليًا`;
                                renderList(); // إعادة رسم فورية لتحديث نص الزرار مباشرة
                            });
                        });
                    }

                    filtersEl.querySelector('[data-callups-cat-filter]').addEventListener('change', renderList);
                    filtersEl.querySelector('[data-callups-search]').addEventListener('input', renderList);

                    renderList();
                    listEl.style.display = 'flex';
                });
            });
            document.querySelectorAll('[data-upload-for]').forEach(input => {
                input.addEventListener('change', async () => {
                    const file = input.files[0];
                    if (!file) return;
                    const fieldKey = input.dataset.uploadFor;
                    const statusEl = document.querySelector(`[data-status-for="${fieldKey}"]`);
                    statusEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جارِ رفع الصورة...';
                    try {
                        const dataUrl = await uploadToStorage(file, `admin-uploads/${key}/${fieldKey}`);
                        document.querySelector(`[data-field="${fieldKey}"]`).value = dataUrl;
                        statusEl.innerHTML = '<i class="fas fa-circle-check"></i> تم رفع الصورة بنجاح';
                        statusEl.classList.add('has-image');
                    } catch (err) {
                        statusEl.innerHTML = '<i class="fas fa-triangle-exclamation"></i> فشل الرفع، حاول مجددًا';
                    }
                });
            });
            document.querySelectorAll('[data-pdf-upload-for]').forEach(input => {
                input.addEventListener('change', async () => {
                    const file = input.files[0];
                    if (!file) return;
                    const fieldKey = input.dataset.pdfUploadFor;
                    const statusEl = document.querySelector(`[data-status-for="${fieldKey}"]`);
                    statusEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جارِ رفع الملف...';
                    try {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            document.querySelector(`[data-field="${fieldKey}"]`).value = e.target.result;
                            statusEl.innerHTML = '<i class="fas fa-circle-check"></i> تم رفع ملف PDF بنجاح';
                            statusEl.classList.add('has-image');
                        };
                        reader.readAsDataURL(file);
                    } catch (err) {
                        statusEl.innerHTML = '<i class="fas fa-triangle-exclamation"></i> فشل الرفع، حاول مجددًا';
                    }
                });
            });
            document.querySelectorAll('[data-remove-for]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const fieldKey = btn.dataset.removeFor;
                    document.querySelector(`[data-field="${fieldKey}"]`).value = '';
                    const statusEl = document.querySelector(`[data-status-for="${fieldKey}"]`);
                    statusEl.innerHTML = '<i class="fas fa-image"></i> لم يتم رفع صورة بعد';
                    statusEl.classList.remove('has-image');
                    btn.remove();
                    document.querySelector('.image-upload-btn').innerHTML = '<i class="fas fa-upload"></i> رفع صورة';
                });
            });

            document.getElementById('saveBtn').onclick = async () => {
                const payload = {};
                config.fields.forEach(f => {
                    const el = document.querySelector(`[data-field="${f.key}"]`);
                    payload[f.key] = f.type === 'number' ? Number(el.value || 0) : el.value;
                });
                if (id) {
                    await dbPatch(config.node, id, payload);
                    cache[key][id] = { ...cache[key][id], ...payload };
                } else {
                    const res = await dbPost(config.node, payload);
                    cache[key][res.name] = payload;
                }
                if (key === 'players') { renderPlayersGrouped(); } else { renderResourceTable(key); }
                closeModal();
                showToast('تم الحفظ بنجاح');
            };
        }

        // ============================================================
        // ATTENDANCE — تسجيل حضور/غياب لاعبي فئة الحصة، وربطه بتاريخ الحصة
        // ============================================================
        async function openAttendanceModal(sessionId) {
            const session = cache.sessions[sessionId];
            if (!session) return;

            if (session.status !== 'finished') {
                alert('يجب تغيير حالة الحصة إلى "منتهية" أولاً من زر التعديل، قبل تسجيل الحضور.');
                return;
            }

            const [players, existingAttendance] = await Promise.all([
                dbGet('players'),
                dbGet('attendance')
            ]);
            const categoryPlayers = Object.entries(players).filter(([, p]) => p.category === session.category);
            const existing = (existingAttendance[sessionId] && existingAttendance[sessionId].records) || {};

            document.getElementById('modalTitle').textContent = `تسجيل الحضور - ${session.name || ''} (${session.category || ''})`;

            if (categoryPlayers.length === 0) {
                document.getElementById('modalBody').innerHTML =
                    `<p style="text-align:center;color:#999;">لا يوجد لاعبون مسجلون في فئة ${session.category || '-'}.</p>`;
            } else {
                document.getElementById('modalBody').innerHTML = `
                    <div class="attendance-list">
                        ${categoryPlayers.map(([pid, p]) => `
                            <div class="attendance-row" data-player-id="${pid}">
                                <span class="att-name">${p.name || ''}</span>
                                <div class="att-toggle">
                                    <button type="button" class="att-btn present ${existing[pid] === 'present' ? 'active' : ''}" data-value="present"><i class="fas fa-check"></i> حاضر</button>
                                    <button type="button" class="att-btn absent ${existing[pid] === 'absent' ? 'active' : ''}" data-value="absent"><i class="fas fa-times"></i> غائب</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                document.querySelectorAll('.attendance-row .att-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const row = btn.closest('.attendance-row');
                        row.querySelectorAll('.att-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                });
            }

            document.getElementById('modalOverlay').classList.add('active');

            document.getElementById('saveBtn').onclick = async () => {
                const records = {};
                document.querySelectorAll('.attendance-row').forEach(row => {
                    const pid = row.dataset.playerId;
                    const activeBtn = row.querySelector('.att-btn.active');
                    records[pid] = activeBtn ? activeBtn.dataset.value : 'absent';
                });
                await dbPut('attendance', sessionId, {
                    sessionId,
                    sessionName: session.name || '',
                    category: session.category || '',
                    date: session.date || '',
                    coach: session.coach || '',
                    records,
                    savedAt: new Date().toISOString()
                });
                closeModal();
                showToast('تم حفظ سجل الحضور بنجاح، وأصبحت الحصة مؤرشفة');
            };
        }

        // ============================================================
        // PAYMENTS — إدارة سجل الدفع الشهري لكل لاعب (12 شهر)
        // ============================================================
        async function loadPayments() {
            const [players, payments] = await Promise.all([dbGet('players'), dbGet('payments')]);
            cache.players = players;
            cache.payments = payments;
            renderPaymentsTable();
        }

        function renderPaymentsTable() {
            const table = document.getElementById('table-payments');
            const entries = Object.entries(cache.players || {});
            if (entries.length === 0) {
                table.innerHTML = `<thead><tr><th>الاسم</th><th>الفئة</th><th>الأشهر المدفوعة</th><th>إجراءات</th></tr></thead>
                    <tbody><tr class="empty-row"><td colspan="4">لا يوجد لاعبون مسجلون بعد.</td></tr></tbody>`;
                return;
            }
            const rows = entries.map(([id, p]) => {
                const playerPayments = (cache.payments && cache.payments[id]) || {};
                const paidCount = MONTHS.filter(m => playerPayments[m]).length;
                return `<tr>
                    <td>${p.name || '-'}</td>
                    <td>${p.category || '-'}</td>
                    <td>${paidCount} / 12</td>
                    <td class="row-actions"><button class="pay-open-btn" data-id="${id}" title="إدارة الدفع"><i class="fas fa-money-bill-wave"></i></button></td>
                </tr>`;
            }).join('');
            table.innerHTML = `<thead><tr><th>الاسم</th><th>الفئة</th><th>الأشهر المدفوعة</th><th>إجراءات</th></tr></thead><tbody>${rows}</tbody>`;
            table.querySelectorAll('.pay-open-btn').forEach(btn => {
                btn.addEventListener('click', () => openPaymentModal(btn.dataset.id));
            });
        }

        function openPaymentModal(playerId) {
            const player = cache.players[playerId];
            const playerPayments = (cache.payments && cache.payments[playerId]) || {};
            document.getElementById('modalTitle').textContent = `سجل الدفع - ${player.name || ''}`;
            document.getElementById('modalBody').innerHTML = `
                <div class="months-grid">
                    ${MONTHS.map(m => `
                        <div class="month-toggle ${playerPayments[m] ? 'paid' : ''}" data-month="${m}">
                            ${MONTH_LABELS[m]}<br><span style="font-size:0.72rem;">${playerPayments[m] ? 'مدفوع' : 'غير مدفوع'}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            document.querySelectorAll('.month-toggle').forEach(el => {
                el.addEventListener('click', () => {
                    el.classList.toggle('paid');
                    const isPaid = el.classList.contains('paid');
                    el.querySelector('span').textContent = isPaid ? 'مدفوع' : 'غير مدفوع';
                });
            });
            document.getElementById('modalOverlay').classList.add('active');

            document.getElementById('saveBtn').onclick = async () => {
                const updated = {};
                document.querySelectorAll('.month-toggle').forEach(el => {
                    updated[el.dataset.month] = el.classList.contains('paid');
                });
                await dbPut('payments', playerId, updated);
                cache.payments[playerId] = updated;
                renderPaymentsTable();
                closeModal();
                showToast('تم حفظ سجل الدفع بنجاح');
            };
        }

        // ============================================================
        // PLAYER RECORD — عرض سجل اللاعب الكامل من قسم اللاعبين مباشرة
        // ============================================================
        async function openPlayerRecordModal(playerId) {
            const [players, attendance, payments] = await Promise.all([
                dbGet('players'), dbGet('attendance'), dbGet('payments')
            ]);
            const player = players[playerId];
            if (!player) return;

            const myAttendance = Object.values(attendance).filter(a => a.records && a.records[playerId] !== undefined)
                .sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
            const myPayments = payments[playerId] || {};
            const presentCount = myAttendance.filter(a => a.records[playerId] === 'present').length;
            const absentCount = myAttendance.filter(a => a.records[playerId] === 'absent').length;
            const paidCount = MONTHS.filter(m => myPayments[m]).length;

            document.getElementById('modalTitle').textContent = `سجل اللاعب - ${player.name || ''}`;
            const docsHTML = (player.parentalConsent || player.medicalCert) ? `
                <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;">
                    ${player.parentalConsent ? `<button class="doc-download-btn" data-doc="${encodeURIComponent(player.parentalConsent)}" data-name="التصريح_الأبوي"><i class="fas fa-file-arrow-down"></i> تحميل التصريح الأبوي</button>` : ''}
                    ${player.medicalCert ? `<button class="doc-download-btn" data-doc="${encodeURIComponent(player.medicalCert)}" data-name="الشهادة_الطبية"><i class="fas fa-file-arrow-down"></i> تحميل الشهادة الطبية</button>` : ''}
                </div>
            ` : '';
            document.getElementById('modalBody').innerHTML = `
                ${docsHTML}
                <div class="stats-grid" style="margin-bottom:6px;">
                    <div class="stat-card"><div class="val">${myAttendance.length}</div><div class="lbl">إجمالي الحصص</div></div>
                    <div class="stat-card"><div class="val">${presentCount}</div><div class="lbl">حضور</div></div>
                    <div class="stat-card"><div class="val">${absentCount}</div><div class="lbl">غياب</div></div>
                    <div class="stat-card"><div class="val">${paidCount} / 12</div><div class="lbl">أشهر مدفوعة</div></div>
                </div>
                <h4 style="margin:14px 0 8px; font-family:'Bebas Neue'; color:var(--primary-dark);">سجل الحضور</h4>
                ${myAttendance.length === 0 ? '<p style="color:#999;">لا يوجد سجل حضور بعد.</p>' : `
                    <div style="max-height:180px; overflow-y:auto;">
                        ${myAttendance.map(a => `
                            <div class="attendance-row">
                                <span class="att-name">${a.date || '-'} — ${a.sessionName || ''}</span>
                                <span style="padding:4px 14px;border-radius:20px;font-size:0.78rem;font-weight:700;${a.records[playerId] === 'present' ? 'background:#E1F6EA;color:#1D8348;' : 'background:#FDEAEA;color:var(--red-accent);'}">
                                    ${a.records[playerId] === 'present' ? 'حاضر' : 'غائب'}
                                </span>
                            </div>
                        `).join('')}
                    </div>
                `}
                <h4 style="margin:16px 0 8px; font-family:'Bebas Neue'; color:var(--primary-dark);">سجل الدفع</h4>
                <div class="months-grid">
                    ${MONTHS.map(m => `<div class="month-toggle ${myPayments[m] ? 'paid' : ''}" style="cursor:default;">${MONTH_LABELS[m]}</div>`).join('')}
                </div>
            `;
            document.getElementById('modalOverlay').classList.add('active');
            document.querySelectorAll('.doc-download-btn[data-doc]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const dataUrl = decodeURIComponent(btn.dataset.doc);
                    const ext = dataUrl.includes('application/pdf') ? 'pdf' : 'jpg';
                    const a = document.createElement('a');
                    a.href = dataUrl;
                    a.download = `${btn.dataset.name}.${ext}`;
                    a.click();
                });
            });
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.textContent = 'إغلاق';
            saveBtn.onclick = closeModal;
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.getElementById('saveBtn').textContent = 'حفظ';
        }
        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target.id === 'modalOverlay') closeModal(); });

        // ============================================================
        // SITE SETTINGS — إعدادات عامة تُطبَّق مباشرة على الصفحة الرئيسية
        // ============================================================
        const SETTINGS_FIELDS = [
            { section: 'الإحصائيات', fields: [
                { key:'playersCount', label:'عدد اللاعبين', type:'number' },
                { key:'coachesCount', label:'عدد المدربين', type:'number' },
                { key:'categoriesCount', label:'عدد الفئات', type:'number' }
            ]},
            { section: 'النصوص التعريفية', fields: [
                { key:'welcomeMessage', label:'رسالة الترحيب (تظهر أسفل الشعار الرئيسي)', type:'textarea' },
                { key:'aboutText1', label:'الفقرة الأولى - نبذة عن الأكاديمية', type:'textarea' },
                { key:'aboutText2', label:'الفقرة الثانية - نبذة عن الأكاديمية', type:'textarea' }
            ]},
            { section: 'معلومات التواصل', fields: [
                { key:'phone', label:'رقم الهاتف', type:'text' },
                { key:'email', label:'البريد الإلكتروني', type:'text' },
                { key:'address', label:'العنوان', type:'text' }
            ]},
            { section: 'روابط التواصل الاجتماعي', fields: [
                { key:'facebook', label:'رابط فيسبوك', type:'text' },
                { key:'instagram', label:'رابط إنستغرام', type:'text' },
                { key:'tiktok', label:'رابط تيك توك', type:'text' },
                { key:'youtube', label:'رابط يوتيوب', type:'text' }
            ]}
        ];

        async function loadSiteSettings() {
            const settings = await dbGet('siteSettings');
            cache.siteSettings = settings;
            const form = document.getElementById('settingsForm');
            form.innerHTML = SETTINGS_FIELDS.map(group => `
                <h4>${group.section}</h4>
                ${group.fields.map(f => `
                    <div class="${f.type === 'textarea' ? 'full' : ''}">
                        <label>${f.label}</label>
                        ${f.type === 'textarea'
                            ? `<textarea data-setting="${f.key}">${settings[f.key] || ''}</textarea>`
                            : `<input type="${f.type}" data-setting="${f.key}" value="${settings[f.key] || ''}" />`}
                    </div>
                `).join('')}
            `).join('');
        }

        document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
            const updated = {};
            document.querySelectorAll('[data-setting]').forEach(el => { updated[el.dataset.setting] = el.value; });
            await fetch(`${DB_URL}siteSettings.json`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updated)
            });
            cache.siteSettings = updated;
            showToast('تم حفظ إعدادات الموقع بنجاح');
        });

        document.getElementById('changeCodeBtn').addEventListener('click', async () => {
            const statusEl = document.getElementById('changeCodeStatus');
            const code = document.getElementById('newAdminCode').value.trim();
            const confirmCode = document.getElementById('confirmAdminCode').value.trim();
            if (!code || code.length < 4) { statusEl.style.color = 'var(--red-accent)'; statusEl.textContent = 'الكود يجب أن يكون 4 خانات على الأقل.'; return; }
            if (code !== confirmCode) { statusEl.style.color = 'var(--red-accent)'; statusEl.textContent = 'الكودان غير متطابقين.'; return; }
            const hash = await sha256(code);
            await fetch(`${DB_URL}adminAccess/codeHash.json`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(hash)
            });
            statusEl.style.color = '#1D8348';
            statusEl.textContent = '✅ تم تغيير الكود بنجاح. سيُطلب منك استخدامه في المرة القادمة.';
            document.getElementById('newAdminCode').value = '';
            document.getElementById('confirmAdminCode').value = '';
        });

        // ============================================================
        // REGISTRATION REQUESTS — قبول ينشئ لاعب تلقائيًا في /players
        // ============================================================
        async function loadRequests() {
            const raw = await dbGet('registrationRequests');
            cache.requests = raw;
            renderRequests();
        }

        const statusLabels = { pending:'قيد الانتظار', accepted:'تم القبول', rejected:'مرفوض', needs_edit:'يحتاج تعديل' };

        function renderRequests() {
            const list = document.getElementById('requestsList');
            const entries = Object.entries(cache.requests || {}).sort((a,b) =>
                new Date(b[1].submittedAt || 0) - new Date(a[1].submittedAt || 0)
            );
            document.getElementById('reqCount').textContent = entries.filter(([,r]) => (r.status || 'pending') === 'pending').length;

            if (entries.length === 0) {
                list.innerHTML = '<div class="req-card">لا توجد طلبات تسجيل حاليًا.</div>';
                return;
            }
            list.innerHTML = entries.map(([id, r]) => `
                <div class="req-card">
                    <div class="req-info">
                        <h4>${r.firstName || ''} ${r.lastName || ''} <span class="req-status ${r.status || 'pending'}">${statusLabels[r.status || 'pending']}</span></h4>
                        <div class="req-meta">
                            <span><i class="fas fa-layer-group"></i> ${r.category || '-'}</span>
                            <span><i class="fas fa-phone"></i> ${r.phone || '-'}</span>
                            <span><i class="fas fa-user"></i> ولي الأمر: ${r.guardianName || '-'}</span>
                            <span><i class="fas fa-calendar"></i> ${r.birthDate || '-'}</span>
                        </div>
                        ${r.editNote ? `<div style="margin-top:8px;font-size:0.82rem;color:#2A5CAA;"><i class="fas fa-comment"></i> ملاحظة: ${r.editNote}</div>` : ''}
                        <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
                            ${r.parentalConsent ? `<button class="doc-download-btn" data-file="${encodeURIComponent(r.parentalConsent)}" data-name="التصريح_الأبوي"><i class="fas fa-file-arrow-down"></i> التصريح الأبوي</button>` : ''}
                            ${r.medicalCert ? `<button class="doc-download-btn" data-file="${encodeURIComponent(r.medicalCert)}" data-name="الشهادة_الطبية"><i class="fas fa-file-arrow-down"></i> الشهادة الطبية</button>` : ''}
                        </div>
                    </div>
                    <div class="req-actions">
                        ${(r.status || 'pending') === 'pending' || r.status === 'needs_edit' ? `
                            <button class="accept-btn" data-id="${id}"><i class="fas fa-check"></i> قبول</button>
                            <button class="reject-btn" data-id="${id}"><i class="fas fa-times"></i> رفض</button>
                            <button class="edit-req-btn" data-id="${id}"><i class="fas fa-pen"></i> طلب تعديل</button>
                        ` : ''}
                    </div>
                </div>
            `).join('');

            list.querySelectorAll('.doc-download-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const dataUrl = decodeURIComponent(btn.dataset.file);
                    const ext = dataUrl.includes('application/pdf') ? 'pdf' : 'jpg';
                    const a = document.createElement('a');
                    a.href = dataUrl;
                    a.download = `${btn.dataset.name}.${ext}`;
                    a.click();
                });
            });
            list.querySelectorAll('.accept-btn').forEach(btn => {
                btn.addEventListener('click', () => acceptRequest(btn.dataset.id));
            });
            list.querySelectorAll('.reject-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await dbPatch('registrationRequests', btn.dataset.id, { status:'rejected' });
                    cache.requests[btn.dataset.id].status = 'rejected';
                    renderRequests();
                    showToast('تم رفض الطلب');
                });
            });
            list.querySelectorAll('.edit-req-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const note = prompt('اكتب ملاحظة التعديل المطلوبة لولي الأمر:');
                    if (note === null) return;
                    await dbPatch('registrationRequests', btn.dataset.id, { status:'needs_edit', editNote: note });
                    cache.requests[btn.dataset.id].status = 'needs_edit';
                    cache.requests[btn.dataset.id].editNote = note;
                    renderRequests();
                    showToast('تم إرسال طلب التعديل');
                });
            });
        }

        // عند القبول: يتم إنشاء ملف اللاعب تلقائيًا في /players بنفس بيانات الطلب
        async function acceptRequest(id) {
            const r = cache.requests[id];
            const playerPayload = {
                name: `${r.firstName || ''} ${r.lastName || ''}`.trim(),
                category: r.category || 'U7',
                birthYear: r.birthDate ? new Date(r.birthDate).getFullYear() : '',
                status: 'active',
                number: '',
                position: '',
                guardianName: r.guardianName || '',
                phone: r.phone || '',
                altPhone: r.altPhone || '',
                guardianIdNumber: r.guardianIdNumber || '',
                bloodType: r.bloodType || '',
                address: r.address || '',
                notes: r.notes || '',
                // المستندات المرفقة عند التسجيل تُنقل مباشرة لملف اللاعب
                parentalConsent: r.parentalConsent || '',
                medicalCert: r.medicalCert || ''
            };
            await dbPost('players', playerPayload);
            await dbPatch('registrationRequests', id, { status:'accepted' });
            cache.requests[id].status = 'accepted';
            renderRequests();
            showToast('تم قبول الطلب وإنشاء ملف اللاعب تلقائيًا مع بياناته والمستندات المرفقة');
        }

        // ============================================================
        // CATEGORIES — CRUD كامل (إضافة، تعديل، حذف) مع تعيين مدرب
        // ============================================================
        async function loadCategories() {
            await loadCategoriesIntoMemory();
            const raw = await dbGet('categoryCoaches');
            cache.categoryCoaches = raw;
            renderCategoriesPanel();
        }

        function renderCategoriesPanel() {
            const list = Object.entries(cache.categoriesList || {}).sort((a, b) => (a[1].order ?? 0) - (b[1].order ?? 0));
            const grid = document.getElementById('categoriesGrid');
            grid.innerHTML = `
                <div class="cat-coach-card" style="border:2px dashed var(--primary-mid); grid-column:1/-1;">
                    <h4><i class="fas fa-plus-circle"></i> إضافة فئة جديدة</h4>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <input type="text" id="newCatId" placeholder="معرّف الفئة (مثال: U21)" />
                        <input type="text" id="newCatAgeLabel" placeholder="التسمية العمرية (مثال: أواسط)" />
                    </div>
                    <button id="addCategoryBtn" style="margin-top:10px;"><i class="fas fa-plus"></i> إضافة الفئة</button>
                </div>
                <div class="cat-coach-card" style="border:2px dashed var(--gold); grid-column:1/-1;">
                    <h4><i class="fas fa-rotate-right"></i> استعادة الفئات الافتراضية للأكاديمية</h4>
                    <p style="font-size:0.82rem; color:#888; margin-bottom:10px;">
                        يضيف فئات U7 حتى U19 وفئة الأكابر مرة واحدة (لا يكرر أي فئة موجودة بالفعل).
                    </p>
                    <button id="seedDefaultCatsBtn"><i class="fas fa-check"></i> استعادة الآن</button>
                </div>
                ${list.map(([id, c]) => `
                    <div class="cat-coach-card">
                        <h4>
                            <input type="text" value="${id}" data-cat-id-edit="${id}" style="font-family:'Bebas Neue'; font-size:1.3rem; border:none; border-bottom:1px solid #ddd; width:100%; margin-bottom:8px;" />
                        </h4>
                        <input type="text" placeholder="التسمية العمرية" value="${c.ageLabel || ''}" data-cat-agelabel="${id}" />
                        <input type="text" placeholder="اسم المدرب" value="${cache.categoryCoaches[id] || ''}" data-cat-coach="${id}" style="margin-top:8px;" />
                        <div style="display:flex; gap:8px; margin-top:10px;">
                            <button data-save-cat="${id}" style="flex:1;"><i class="fas fa-save"></i> حفظ</button>
                            <button data-delete-cat="${id}" style="flex:1; background:var(--red-accent);"><i class="fas fa-trash"></i> حذف</button>
                        </div>
                    </div>
                `).join('')}
            `;

            document.getElementById('addCategoryBtn').addEventListener('click', async () => {
                const newId = document.getElementById('newCatId').value.trim();
                const newAgeLabel = document.getElementById('newCatAgeLabel').value.trim();
                if (!newId) { alert('يجب إدخال معرّف للفئة (مثل U21).'); return; }
                if (cache.categoriesList[newId]) { alert('هذه الفئة موجودة بالفعل.'); return; }
                const order = Object.keys(cache.categoriesList).length;
                await dbPut('categoriesList', newId, { ageLabel: newAgeLabel, order });
                cache.categoriesList[newId] = { ageLabel: newAgeLabel, order };
                await loadCategoriesIntoMemory();
                renderCategoriesPanel();
                showToast(`تم إضافة فئة ${newId}`);
            });

            document.querySelectorAll('[data-save-cat]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const oldId = btn.dataset.saveCat;
                    const newId = document.querySelector(`[data-cat-id-edit="${oldId}"]`).value.trim();
                    const ageLabel = document.querySelector(`[data-cat-agelabel="${oldId}"]`).value.trim();
                    const coach = document.querySelector(`[data-cat-coach="${oldId}"]`).value.trim();

                    if (newId !== oldId) {
                        // إعادة تسمية الفئة: ننشئ سجل جديد بالاسم الجديد وننقل بيانات المدرب، ثم نحذف القديم
                        // ملاحظة: هذا لا يغيّر تلقائيًا فئة اللاعبين/الحصص الحاليين المرتبطين بالاسم القديم
                        await dbPut('categoriesList', newId, { ageLabel, order: cache.categoriesList[oldId].order ?? 0 });
                        await dbDelete('categoriesList', oldId);
                        await dbPut('categoryCoaches', newId, coach);
                        await dbDelete('categoryCoaches', oldId);
                        showToast(`تم تغيير معرّف الفئة إلى ${newId}. تنبيه: عدّل يدويًا أي لاعبين/حصص كانوا مرتبطين بـ ${oldId}.`);
                    } else {
                        await dbPut('categoriesList', oldId, { ageLabel, order: cache.categoriesList[oldId].order ?? 0 });
                        await dbPut('categoryCoaches', oldId, coach);
                        showToast(`تم حفظ فئة ${oldId}`);
                    }
                    await loadCategoriesIntoMemory();
                    cache.categoryCoaches = await dbGet('categoryCoaches');
                    renderCategoriesPanel();
                });
            });

            document.querySelectorAll('[data-delete-cat]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.deleteCat;
                    if (!confirm(`تأكيد حذف فئة ${id}؟ (لن يتم حذف اللاعبين المرتبطين بها تلقائيًا)`)) return;
                    await dbDelete('categoriesList', id);
                    delete cache.categoriesList[id];
                    await loadCategoriesIntoMemory();
                    renderCategoriesPanel();
                    showToast(`تم حذف فئة ${id}`);
                });
            });

            document.getElementById('seedDefaultCatsBtn').addEventListener('click', async () => {
                const defaults = [
                    { id:'U7',  ageLabel:'براعم' },
                    { id:'U9',  ageLabel:'صغار' },
                    { id:'U11', ageLabel:'ناشئين' },
                    { id:'U13', ageLabel:'أشبال' },
                    { id:'U15', ageLabel:'فتيان' },
                    { id:'U17', ageLabel:'شباب' },
                    { id:'U19', ageLabel:'أواسط' },
                    { id:'الأكابر', ageLabel:'الفريق الأول' }
                ];
                let addedCount = 0;
                for (let i = 0; i < defaults.length; i++) {
                    const { id, ageLabel } = defaults[i];
                    if (cache.categoriesList[id]) continue; // لا نكرر فئة موجودة بالفعل
                    await dbPut('categoriesList', id, { ageLabel, order: i });
                    cache.categoriesList[id] = { ageLabel, order: i };
                    addedCount++;
                }
                await loadCategoriesIntoMemory();
                renderCategoriesPanel();
                showToast(addedCount > 0 ? `تم إضافة ${addedCount} فئة جديدة` : 'كل الفئات الافتراضية موجودة بالفعل');
            });
        }

        // ============================================================
        // OVERVIEW (Dashboard) — إحصائيات سريعة
        // ============================================================
        async function loadOverview() {
            const [players, requests, matches, news] = await Promise.all([
                dbGet('players'), dbGet('registrationRequests'), dbGet('matches'), dbGet('news')
            ]);
            const playersCount = Object.keys(players).length;
            const pendingCount = Object.values(requests).filter(r => (r.status || 'pending') === 'pending').length;
            const upcomingMatches = Object.values(matches).filter(m => m.status === 'upcoming').length;
            const newsCount = Object.keys(news).length;

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="val">${playersCount}</div><div class="lbl">إجمالي اللاعبين</div></div>
                <div class="stat-card"><div class="val">${pendingCount}</div><div class="lbl">طلبات تسجيل قيد الانتظار</div></div>
                <div class="stat-card"><div class="val">${upcomingMatches}</div><div class="lbl">مباريات قادمة</div></div>
                <div class="stat-card"><div class="val">${newsCount}</div><div class="lbl">أخبار في الشريط المتحرك</div></div>
            `;
            document.getElementById('reqCount').textContent = pendingCount;
        }

        // ============================================================
        // INIT
        // ============================================================
        (async function initDashboard() {
            await loadCategoriesIntoMemory();
            loadOverview();
        })();
    </script>
</body>
</html>
